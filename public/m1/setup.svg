<svg viewBox="0 0 560 370" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="560" height="370" fill="#0d1117"/>
  <!-- Window chrome -->
  <rect width="560" height="28" fill="#161b22"/>
  <circle cx="14" cy="14" r="4.5" fill="#FF5F57"/>
  <circle cx="26" cy="14" r="4.5" fill="#FFBD2E"/>
  <circle cx="38" cy="14" r="4.5" fill="#28CA41"/>
  <text x="280" y="19" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">claude.ai — New Conversation</text>
  <!-- Left nav -->
  <rect x="0" y="28" width="48" height="342" fill="#010409"/>
  <rect x="8" y="44" width="32" height="32" rx="6" fill="#1f6feb" opacity="0.18"/>
  <text x="24" y="66" font-family="system-ui,sans-serif" font-size="20" fill="#58a6ff" text-anchor="middle">✦</text>
  <text x="24" y="108" font-family="system-ui,sans-serif" font-size="14" fill="#3d444d" text-anchor="middle">☰</text>
  <!-- Main content area -->
  <rect x="48" y="28" width="512" height="342" fill="#0d1117"/>
  <!-- Heading -->
  <text x="280" y="82" font-family="system-ui,-apple-system,sans-serif" font-size="17" fill="#e6edf3" text-anchor="middle" font-weight="600">How can I help you today?</text>
  <!-- File attachment chip -->
  <rect x="126" y="100" width="308" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- CSV file icon -->
  <rect x="144" y="110" width="36" height="40" rx="4" fill="#1f4e8c" opacity="0.5"/>
  <text x="162" y="135" font-family="Consolas,monospace" font-size="9" fill="#79c0ff" text-anchor="middle">CSV</text>
  <!-- File info -->
  <text x="192" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e6edf3" font-weight="500">shop-sales.csv</text>
  <text x="192" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8b949e">46,112 rows · 1.8 MB · attached</text>
  <!-- Remove button -->
  <text x="414" y="125" font-family="system-ui,sans-serif" font-size="16" fill="#6e7681" text-anchor="middle">×</text>
  <!-- Input area -->
  <rect x="78" y="184" width="404" height="48" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="104" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#484f58">Message Claude…</text>
  <!-- Send button (inactive) -->
  <rect x="444" y="196" width="28" height="24" rx="6" fill="#21262d"/>
  <text x="458" y="213" font-family="system-ui,sans-serif" font-size="13" fill="#484f58" text-anchor="middle">↑</text>
  <!-- Status row -->
  <text x="280" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#484f58" text-anchor="middle">workspace-naive · no system prompt · no skills directory</text>
  <!-- Warning badge -->
  <rect x="162" y="282" width="236" height="20" rx="5" fill="#5a1d1d" opacity="0.5"/>
  <text x="280" y="296" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#f85149" text-anchor="middle">⚠ No harness active — raw AI mode</text>
  <!-- Subtle bottom gradient to blend with caption overlay -->
  <defs>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect x="0" y="310" width="560" height="60" fill="url(#bottomFade)"/>
</svg>
