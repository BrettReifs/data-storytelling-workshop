<svg viewBox="0 0 560 370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="560" height="370" fill="#0d1117"/>
  <rect width="560" height="28" fill="#161b22"/>
  <circle cx="14" cy="14" r="4.5" fill="#FF5F57"/>
  <circle cx="26" cy="14" r="4.5" fill="#FFBD2E"/>
  <circle cx="38" cy="14" r="4.5" fill="#28CA41"/>
  <text x="280" y="19" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">claude.ai</text>
  <rect x="0" y="28" width="48" height="342" fill="#010409"/>
  <rect x="48" y="28" width="512" height="342" fill="#0d1117"/>
  <!-- User message (right side) -->
  <rect x="308" y="44" width="232" height="36" rx="8" fill="#1c3a5e"/>
  <text x="424" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3" text-anchor="middle">📎 shop-sales.csv — uploaded</text>
  <!-- AI response card -->
  <rect x="68" y="96" width="416" height="134" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- CSV icon in response -->
  <rect x="86" y="110" width="30" height="36" rx="3" fill="#1f4e8c" opacity="0.45"/>
  <text x="101" y="131" font-family="Consolas,monospace" font-size="9" fill="#79c0ff" text-anchor="middle">CSV</text>
  <!-- File label -->
  <text x="126" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e6edf3" font-weight="600">shop-sales.csv</text>
  <text x="126" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8b949e">46,112 rows · 8 columns · 1.8 MB</text>
  <!-- Divider -->
  <line x1="86" y1="152" x2="466" y2="152" stroke="#30363d" stroke-width="1"/>
  <!-- Details -->
  <text x="86" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">Period</text>
  <text x="136" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">Oct 2024 – Mar 2025  (6 months)</text>
  <text x="86" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">Shops</text>
  <text x="136" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">6 locations  (S1 Pike Place … S6 Eastlake)</text>
  <text x="86" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">Status</text>
  <text x="136" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3fb950">✓  File accepted.  Ready to analyze.</text>
  <!-- Next prompt cue -->
  <rect x="68" y="246" width="416" height="36" rx="8" fill="#0d2018" stroke="#1a4731" stroke-width="1"/>
  <text x="86" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3fb950">Prompt ready →</text>
  <text x="180" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">Analyze this data and tell me what is interesting.</text>
  <!-- Input -->
  <rect x="78" y="296" width="404" height="40" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="104" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#484f58">Message Claude…</text>
  <rect x="0" y="318" width="560" height="52" fill="url(#bottomFade)"/>
