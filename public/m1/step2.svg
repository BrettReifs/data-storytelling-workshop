  <!-- Findings -->
  <circle cx="98" cy="132" r="3" fill="#58a6ff"/>
  <text x="110" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">S1 Pike Place leads total revenue at <tspan font-weight="600" fill="#79c0ff">$42,847</tspan> over 6 months</text>
  <circle cx="98" cy="154" r="3" fill="#58a6ff"/>
  <text x="110" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">Revenue trend: <tspan font-weight="600" fill="#3fb950">+12.3%</tspan> month-over-month across all locations</text>
  <circle cx="98" cy="176" r="3" fill="#58a6ff"/>
  <text x="110" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">Top 3 shops account for <tspan font-weight="600">61%</tspan> of total transaction volume</text>
  <circle cx="98" cy="198" r="3" fill="#58a6ff"/>
  <text x="110" y="202" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">January shows a seasonal dip across all locations simultaneously</text>
  <circle cx="98" cy="220" r="3" fill="#58a6ff"/>
  <text x="110" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">Weekend transactions average <tspan font-weight="600">34% higher</tspan> than weekday volume</text>
  <circle cx="98" cy="242" r="3" fill="#58a6ff"/>
  <text x="110" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">S3 Capitol Hill shows the strongest Q1 growth trajectory</text>
  <line x1="86" y1="258" x2="474" y2="258" stroke="#30363d" stroke-width="1"/>
  <!-- No caveats notice (subtle, muted) -->
  <text x="86" y="276" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#484f58">0 source citations  ·  0 confidence ranges  ·  0 data quality disclosures</text>
