  <rect x="78" y="318" width="404" height="38" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="104" y="342" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#484f58">Message Claude…</text>
