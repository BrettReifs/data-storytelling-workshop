<svg viewBox="0 0 560 370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="560" height="370" fill="#0d1117"/>
  <rect width="560" height="28" fill="#161b22"/>
  <circle cx="14" cy="14" r="4.5" fill="#FF5F57"/>
  <circle cx="26" cy="14" r="4.5" fill="#FFBD2E"/>
  <circle cx="38" cy="14" r="4.5" fill="#28CA41"/>
  <text x="280" y="19" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">claude.ai</text>
  <rect x="0" y="28" width="48" height="342" fill="#010409"/>
  <rect x="48" y="28" width="512" height="342" fill="#0d1117"/>
  <!-- User message -->
  <rect x="262" y="38" width="278" height="50" rx="8" fill="#1c3a5e"/>
  <text x="401" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3" text-anchor="middle">Which rows in shop-sales.csv</text>
  <text x="401" y="73" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3" text-anchor="middle">support the +12.3% revenue trend?</text>
  <!-- AI response — hedging -->
  <rect x="68" y="104" width="424" height="172" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="86" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">The revenue trend of +12.3% reflects the aggregate pattern</text>
  <text x="86" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">across all shops in the dataset. This was calculated using the</text>
  <text x="86" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">available transaction records, showing consistent growth from</text>
  <text x="86" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">October through March, with seasonal variation accounted for.</text>
  <line x1="86" y1="186" x2="474" y2="186" stroke="#30363d" stroke-width="1"/>
  <text x="86" y="202" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">The trend aligns with typical seasonal retail patterns during the</text>
  <text x="86" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">holiday and new year period. Would you like a breakdown?</text>
  <line x1="86" y1="230" x2="474" y2="230" stroke="#30363d" stroke-width="1"/>
  <!-- No citations callout -->
  <rect x="86" y="238" width="200" height="22" rx="5" fill="#5a3e0a" opacity="0.6"/>
  <text x="186" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e3b341" text-anchor="middle">⚠ No row-level citations provided</text>
  <!-- Gap indicator -->
  <text x="310" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#484f58">The gap is visible — ask again.</text>
  <!-- Input -->
  <rect x="78" y="296" width="404" height="40" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="104" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#484f58">Push harder — ask for row-level evidence…</text>
  <rect x="0" y="318" width="560" height="52" fill="url(#bottomFade)"/>
</svg>
