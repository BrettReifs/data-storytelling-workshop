<svg viewBox="0 0 560 370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="560" height="370" fill="#0d1117"/>
  <rect width="560" height="28" fill="#161b22"/>
  <circle cx="14" cy="14" r="4.5" fill="#FF5F57"/>
  <circle cx="26" cy="14" r="4.5" fill="#FFBD2E"/>
  <circle cx="38" cy="14" r="4.5" fill="#28CA41"/>
  <text x="280" y="19" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">Claude (workspace-harnessed)</text>
  <rect x="0" y="28" width="48" height="342" fill="#010409"/>
  <rect x="48" y="28" width="512" height="342" fill="#0d1117"/>
  <!-- User single prompt invoking 3 skills -->
  <rect x="68" y="38" width="424" height="72" rx="8" fill="#1c3a5e"/>
  <text x="86" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">Using <tspan fill="#79c0ff" font-weight="600">/data-confidence-scorer</tspan>, <tspan fill="#79c0ff" font-weight="600">/html-infographic-builder</tspan>,</text>
  <text x="86" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">and <tspan fill="#79c0ff" font-weight="600">/spotlight-walkthrough</tspan> — generate the complete</text>
  <text x="86" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">confident narrative package for the VP briefing.</text>
  <!-- Agent response: queuing skills -->
  <rect x="68" y="122" width="424" height="158" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="86" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">Queuing 3 skills in sequence…</text>
  <line x1="86" y1="150" x2="474" y2="150" stroke="#30363d" stroke-width="1"/>
  <!-- Skill 1 -->
  <rect x="86" y="158" width="388" height="28" rx="5" fill="#0d2018" stroke="#1a4731" stroke-width="1"/>
  <text x="100" y="176" font-family="Consolas,monospace" font-size="10" fill="#3fb950">▶</text>
  <text x="116" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#e6edf3">/data-confidence-scorer</text>
  <text x="290" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8b949e">scoring 12 claims…</text>
  <!-- Skill 2 -->
  <rect x="86" y="194" width="388" height="28" rx="5" fill="#0d2018" stroke="#1a4731" stroke-width="1"/>
  <text x="100" y="212" font-family="Consolas,monospace" font-size="10" fill="#3fb950">▶</text>
  <text x="116" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#e6edf3">/html-infographic-builder</text>
  <text x="298" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8b949e">generating report…</text>
  <!-- Skill 3 -->
  <rect x="86" y="230" width="388" height="28" rx="5" fill="#0d2018" stroke="#1a4731" stroke-width="1"/>
  <text x="100" y="248" font-family="Consolas,monospace" font-size="10" fill="#3fb950">▶</text>
  <text x="116" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#e6edf3">/spotlight-walkthrough</text>
  <text x="282" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8b949e">building 5-step tour…</text>
  <line x1="86" y1="266" x2="474" y2="266" stroke="#30363d" stroke-width="1"/>
  <text x="86" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8b949e">Running without interruption · will output a single final-report.html</text>
  <!-- Output confirmation -->
