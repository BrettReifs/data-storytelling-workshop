  <text x="86" y="318" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#3fb950">✓ final-report.html ready to open</text>
  <rect x="0" y="318" width="560" height="52" fill="url(#bottomFade)"/>
