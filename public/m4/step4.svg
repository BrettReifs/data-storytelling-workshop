  <!-- Code content above the highlighted section -->
  <text x="66" y="70" font-family="Consolas,monospace" font-size="11" fill="#d4a853"># Operating Instructions</text>
  <text x="66" y="88" font-family="Consolas,monospace" font-size="10" fill="#6e7681"><!-- workspace-harnessed --></text>
  <text x="66" y="106" font-family="Consolas,monospace" font-size="11" fill="#ce9178">## Role</text>
  <text x="66" y="122" font-family="Consolas,monospace" font-size="10" fill="#cccccc">Data analysis agent with 6 skills loaded from .agents/skills/.</text>
  <text x="66" y="140" font-family="Consolas,monospace" font-size="11" fill="#ce9178">## Output Standards</text>
  <text x="66" y="156" font-family="Consolas,monospace" font-size="10" fill="#cccccc">Every claim must include a confidence score (0–1) and cite</text>
  <text x="66" y="171" font-family="Consolas,monospace" font-size="10" fill="#cccccc">source rows from the originating file.</text>
  <!-- HIGHLIGHTED SECTION: Dataset Scoping -->
  <rect x="56" y="182" width="494" height="104" rx="4" fill="url(#highlightGlow)" stroke="#d4a853" stroke-width="1.5"/>
  <!-- Line numbers simulation -->
  <text x="60" y="200" font-family="Consolas,monospace" font-size="10" fill="#495162">12</text>
  <text x="60" y="216" font-family="Consolas,monospace" font-size="10" fill="#495162">13</text>
  <text x="60" y="232" font-family="Consolas,monospace" font-size="10" fill="#495162">14</text>
  <text x="60" y="248" font-family="Consolas,monospace" font-size="10" fill="#495162">15</text>
  <text x="60" y="264" font-family="Consolas,monospace" font-size="10" fill="#495162">16</text>
  <text x="60" y="280" font-family="Consolas,monospace" font-size="10" fill="#495162">17</text>
  <!-- Section heading -->
  <text x="82" y="200" font-family="Consolas,monospace" font-size="11" fill="#d4a853" font-weight="700">## Dataset Scoping</text>
  <!-- Rules -->
  <text x="82" y="216" font-family="Consolas,monospace" font-size="10" fill="#cccccc">When multiple datasets are loaded, always reference files</text>
  <text x="82" y="232" font-family="Consolas,monospace" font-size="10" fill="#cccccc">explicitly. Never blend context across data tracks without</text>
  <text x="82" y="248" font-family="Consolas,monospace" font-size="10" fill="#cccccc">explicit scoping in your prompt.</text>
  <text x="82" y="264" font-family="Consolas,monospace" font-size="10" fill="#9cdcfe">Example: "In data/coffee-shops/shop-sales.csv, the S3…"</text>
  <text x="82" y="280" font-family="Consolas,monospace" font-size="10" fill="#6a9955"><!-- Prevents silent cross-dataset context blending --></text>
  <!-- Code below -->
  <text x="66" y="300" font-family="Consolas,monospace" font-size="11" fill="#ce9178">## Interview Required</text>
  <text x="66" y="316" font-family="Consolas,monospace" font-size="10" fill="#cccccc">Run /data-refinement-interview before any analysis.</text>
