<svg viewBox="0 0 560 370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="560" height="370" fill="#0d1117"/>
  <rect width="560" height="28" fill="#161b22"/>
  <circle cx="14" cy="14" r="4.5" fill="#FF5F57"/>
  <circle cx="26" cy="14" r="4.5" fill="#FFBD2E"/>
  <circle cx="38" cy="14" r="4.5" fill="#28CA41"/>
  <text x="280" y="19" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">claude.ai</text>
  <rect x="0" y="28" width="48" height="342" fill="#010409"/>
  <rect x="48" y="28" width="512" height="342" fill="#0d1117"/>
  <!-- User challenge message -->
  <rect x="180" y="38" width="362" height="52" rx="8" fill="#1c3a5e"/>
  <text x="361" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#e6edf3" text-anchor="middle">Which rows in shop-sales.csv support</text>
  <text x="361" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#e6edf3" text-anchor="middle">the $42,847 revenue total for S1 Pike Place?</text>
  <!-- AI hedging response -->
  <rect x="68" y="106" width="424" height="172" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="86" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">The revenue figures shown in the report represent aggregated</text>
  <text x="86" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">calculations from the sales data you uploaded. The $42,847</text>
  <text x="86" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">figure for S1 Pike Place reflects the total transactions attributed</text>
  <text x="86" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e6edf3">to that location across the full analysis period.</text>
  <line x1="86" y1="188" x2="474" y2="188" stroke="#30363d" stroke-width="1"/>
  <text x="86" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">The exact row references would require re-running the original</text>
  <text x="86" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">calculation steps. The metric is consistent with the dataset.</text>
  <line x1="86" y1="234" x2="474" y2="234" stroke="#30363d" stroke-width="1"/>
  <!-- Two callouts side by side -->
  <rect x="86" y="242" width="190" height="22" rx="5" fill="#5a3e0a" opacity="0.6"/>
  <text x="181" y="257" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e3b341" text-anchor="middle">⚠ No row citations provided</text>
  <rect x="290" y="242" width="188" height="22" rx="5" fill="#3d1a1a" opacity="0.6"/>
  <text x="384" y="257" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#f85149" text-anchor="middle">Surface quality ≠ foundation</text>
  <!-- Bottom prompt -->
  <rect x="78" y="300" width="404" height="40" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="104" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#484f58">This is the gap the harness closes →</text>
  <rect x="0" y="316" width="560" height="54" fill="url(#bottomFade)"/>
</svg>
