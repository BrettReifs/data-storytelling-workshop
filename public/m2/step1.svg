  <text x="102" y="176" font-family="Consolas,monospace" font-size="10" fill="#e6edf3">&lt;<tspan fill="#7ee787">html</tspan> <tspan fill="#79c0ff">lang</tspan>=<tspan fill="#a5d6ff">"en"</tspan>&gt;</text>
  <text x="102" y="192" font-family="Consolas,monospace" font-size="10" fill="#e6edf3">  &lt;<tspan fill="#7ee787">head</tspan>&gt;</text>
  <text x="102" y="208" font-family="Consolas,monospace" font-size="10" fill="#6e7681">    &lt;!-- Charts.js + custom CSS --&gt;</text>
  <text x="102" y="224" font-family="Consolas,monospace" font-size="10" fill="#e6edf3">    &lt;<tspan fill="#7ee787">title</tspan>&gt;<tspan fill="#a5d6ff">Coffee Shop Report</tspan>&lt;/<tspan fill="#7ee787">title</tspan>&gt;</text>
  <text x="102" y="240" font-family="Consolas,monospace" font-size="10" fill="#e6edf3">    &lt;<tspan fill="#7ee787">style</tspan>&gt;<tspan fill="#6e7681">/* professional styles */</tspan>&lt;/<tspan fill="#7ee787">style</tspan>&gt;</text>
  <text x="102" y="256" font-family="Consolas,monospace" font-size="10" fill="#e6edf3">  &lt;/<tspan fill="#7ee787">head</tspan>&gt;  &lt;<tspan fill="#7ee787">body</tspan>&gt;  …</text>
  <text x="102" y="276" font-family="Consolas,monospace" font-size="10" fill="#8b949e">  &lt;!-- 3 charts + metric cards + insights --&gt;</text>
