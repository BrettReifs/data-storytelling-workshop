  <!-- User prompt -->
  <rect x="220" y="38" width="322" height="62" rx="8" fill="#1c3a5e"/>
  <text x="381" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">Generate a standalone HTML infographic</text>
  <text x="381" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">with 3+ charts and professional styling</text>
  <text x="381" y="86" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#79c0ff" text-anchor="middle">based on the data we analyzed.</text>
  <!-- AI response: code generation -->
  <rect x="68" y="112" width="424" height="194" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="86" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b949e">Generating standalone HTML report…</text>
